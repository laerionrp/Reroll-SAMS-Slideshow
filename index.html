<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slideshow</title>

<style>
    body {
        margin: 0;
        overflow: hidden;
        background: white;
    }
 
    img {
        position: absolute;
        width: 100%;
        height: 100%;
        object-fit: contain;
        opacity: 0;
        transition: opacity 1s;
        z-index: 1;
    }

    img.active {
        opacity: 1;
    }

/* Barre de progression */
    #progress-container {
        position: absolute;
        bottom: 0;
        left: 0;
        width: 100%;
        height: 50px;
        background: rgba(255,255,255,0.15);
        z-index: 9999;
    }

    #progress-bar {
        width: 0%;
        height: 100%;
        background: #d40000;
    }
</style>
</head>

<body>

<img src="images/image1.png" class="active">
<img src="images/image2.png">
<img src="images/image3.png">

<script>
const images = document.querySelectorAll("img");
let current = 0;

setInterval(() => {
    images[current].classList.remove("active");

    current = (current + 1) % images.length;

    images[current].classList.add("active");
}, 15000);

setInterval(() => {
    location.reload();
}, 900000);
</script>

</body>
</html>
